<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Secure File Sharing</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #070714;
      --surface: #0e0e24;
      --border: #1e1b4b;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --text: #e0e7ff;
      --muted: #9ca3af;
      --dim: #374151;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      padding: 2rem;
    }
    input, select, textarea, button {
      font-family: 'Space Grotesk', sans-serif !important;
    }

    /* subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
    }

    /* brand */
    .brand { text-align: center; margin-bottom: 2rem; }
    .brand-icon {
      width: 68px; height: 68px;
      background: #1e1b4b;
      border: 1px solid #4338ca;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .brand-icon svg { width: 32px; height: 32px; fill: #818cf8; }
    .brand h1 { font-size: 26px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .brand p { font-size: 14px; color: var(--accent); letter-spacing: 0.3px; }

    /* badge */
    .badge-enc {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 11px; color: var(--accent);
      margin-bottom: 1.5rem;
    }
    .badge-enc svg { width: 11px; height: 11px; fill: var(--accent); }

    /* card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
    }

    /* form */
    .form-label { font-size: 13px; color: var(--muted); margin-bottom: 6px; display: block; }

    .input-wrap { position: relative; }
    .input-wrap svg {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px; fill: var(--dim);
      pointer-events: none;
    }

    .form-control {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      padding: 12px 38px 12px 14px;
      outline: none;
      transition: border 0.2s;
    }
    .form-control:focus { border-color: var(--accent); }
    .form-control::placeholder { color: var(--dim); }

    .forgot { font-size: 12px; color: var(--accent); float: right; margin-top: 6px; text-decoration: none; }
    .forgot:hover { text-decoration: underline; color: var(--accent); }

    .btn-main {
      width: 100%; padding: 13px;
      background: var(--accent);
      border: none; border-radius: 10px;
      color: white; font-size: 16px; font-weight: 500;
      font-family: inherit; cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      margin-top: 4px;
    }
    .btn-main:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-main:active { transform: translateY(0); }

    .foot { text-align: center; font-size: 13px; color: var(--muted); margin-top: 1.25rem; }
    .foot a { color: #818cf8; text-decoration: none; }
    .foot a:hover { text-decoration: underline; }

    /* alert */
    .alert-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      color: #fca5a5;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 1rem;
      display: none;
    }

    /* loading spinner on btn */
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93C9.33 17.79 7 14.5 7 11V7.18L12 5z"/></svg>
    </div>
    <h1>Secure File Sharing</h1>
    <p>End-to-end encrypted file storage</p>
  </div>

  <div style="text-align:center">
    <div class="badge-enc">
      <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
      AES-256 Encrypted
    </div>
  </div>

  <div class="card">
    <div class="alert-msg" id="error-msg"></div>

    <div class="mb-3">
      <label class="form-label">Email address</label>
      <div class="input-wrap">
        <input type="email" class="form-control" id="email" placeholder="you@example.com" />
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
      </div>
    </div>

    <div class="mb-1">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <input type="password" class="form-control" id="password" placeholder="••••••••" />
        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
      </div>
    </div>

    <div class="mb-3">
      <a href="forgot-password.html" class="forgot">Forgot password?</a>
      <div style="clear:both"></div>
    </div>

    <button class="btn-main" id="login-btn" onclick="handleLogin()">Sign In</button>

    <div class="foot">New here? <a href="register.html">Create an account</a></div>
  </div>
</div>

<script>
  const API = 'http://localhost:3000';

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('error-msg');

    errEl.style.display = 'none';

    if (!email || !password) {
      showError('Please fill in all fields');
      return;
    }

    btn.innerHTML = '<span class="spinner"></span>Signing in...';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        showError(data.message || 'Login failed');
        return;
      }

      localStorage.setItem('token', data.token);
      window.location.href = 'home.html';

    } catch (err) {
      showError('Server error, please try again');
    } finally {
      btn.innerHTML = 'Sign In';
      btn.disabled = false;
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>

</body>
</html>
