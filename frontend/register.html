<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — Secure File Sharing</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #070714;
      --surface: #0e0e24;
      --border: #1e1b4b;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --text: #e0e7ff;
      --muted: #9ca3af;
      --dim: #374151;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      padding: 2.5rem;
    }
    input, select, textarea, button {
      font-family: 'Space Grotesk', sans-serif !important;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
    }

    .brand { text-align: center; margin-bottom: 2rem; }
    .brand-icon {
      width: 68px; height: 68px;
      background: #1e1b4b;
      border: 1px solid #4338ca;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .brand-icon svg { width: 32px; height: 32px; fill: #818cf8; }
    .brand h1 { font-size: 26px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .brand p { font-size: 14px; color: var(--accent); letter-spacing: 0.3px; }

    .badge-enc {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 11px; color: var(--accent);
      margin-bottom: 1.5rem;
    }
    .badge-enc svg { width: 11px; height: 11px; fill: var(--accent); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
    }

    .form-label { font-size: 13px; color: var(--muted); margin-bottom: 6px; display: block; }

    .input-wrap { position: relative; }
    .input-wrap svg {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px; fill: var(--dim);
      pointer-events: none;
    }

    .form-control {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      padding: 12px 38px 12px 14px;
      outline: none;
      transition: border 0.2s;
    }
    .form-control:focus { border-color: var(--accent); }
    .form-control::placeholder { color: var(--dim); }

    .btn-main {
      width: 100%; padding: 13px;
      background: var(--accent);
      border: none; border-radius: 10px;
      color: white; font-size: 16px; font-weight: 500;
      font-family: inherit; cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      margin-top: 4px;
    }
    .btn-main:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-main:active { transform: translateY(0); }

    .foot { text-align: center; font-size: 13px; color: var(--muted); margin-top: 1.25rem; }
    .foot a { color: #818cf8; text-decoration: none; }
    .foot a:hover { text-decoration: underline; }

    .alert-msg {
      border-radius: 8px;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 1rem;
      display: none;
    }
    .alert-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
    }
    .alert-success {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: #86efac;
    }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* OTP screen */
    .otp-screen { display: none; }
    .otp-inputs { display: flex; gap: 10px; justify-content: center; margin: 1.5rem 0; }
    .otp-inputs input {
      width: 48px; height: 52px;
      text-align: center;
      font-size: 20px; font-weight: 600;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      outline: none;
      transition: border 0.2s;
      font-family: inherit;
    }
    .otp-inputs input:focus { border-color: var(--accent); }
    .otp-info { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 0.5rem; }
    .otp-info span { color: var(--text); font-weight: 500; }
    .resend { text-align: center; font-size: 12px; color: var(--dim); margin-top: 1rem; }
    .resend a { color: var(--accent); cursor: pointer; text-decoration: none; }
    .resend a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93C9.33 17.79 7 14.5 7 11V7.18L12 5z"/></svg>
    </div>
    <h1>Secure File Sharing</h1>
    <p>End-to-end encrypted file storage</p>
  </div>

  <div style="text-align:center">
    <div class="badge-enc">
      <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
      AES-256 Encrypted
    </div>
  </div>

  <div class="card">
    <!-- Register Form -->
    <div id="register-screen">
      <div class="alert-msg alert-error" id="reg-error"></div>

      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-wrap">
          <input type="text" class="form-control" id="username" placeholder="your username" />
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Email address</label>
        <div class="input-wrap">
          <input type="email" class="form-control" id="email" placeholder="you@example.com" />
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input type="password" class="form-control" id="password" placeholder="••••••••" />
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
        </div>
      </div>

      <button class="btn-main" id="reg-btn" onclick="handleRegister()">Create Account</button>
      <div class="foot">Already have an account? <a href="login.html">Sign in</a></div>
    </div>

    <!-- OTP Verification Screen -->
    <div class="otp-screen" id="otp-screen">
      <div class="alert-msg alert-error" id="otp-error"></div>
      <div class="alert-msg alert-success" id="otp-success"></div>

      <div style="text-align:center; margin-bottom:1rem">
        <div style="width:52px;height:52px;background:#1e1b4b;border:1px solid #4338ca;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem">
          <svg width="24" height="24" fill="#818cf8" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </div>
        <p style="font-size:15px;font-weight:500;color:var(--text);margin-bottom:6px">Check your email</p>
        <p class="otp-info">We sent a 5-digit code to<br><span id="otp-email-display"></span></p>
      </div>

      <div class="otp-inputs">
        <input type="text" maxlength="1" class="otp-digit" />
        <input type="text" maxlength="1" class="otp-digit" />
        <input type="text" maxlength="1" class="otp-digit" />
        <input type="text" maxlength="1" class="otp-digit" />
        <input type="text" maxlength="1" class="otp-digit" />
      </div>

      <button class="btn-main" id="otp-btn" onclick="handleConfirmEmail()">Verify Email</button>

      <div class="resend">
        Didn't receive it? <a onclick="handleResend()">Resend code</a>
      </div>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:3000';
  let userEmail = '';

  async function handleRegister() {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('reg-btn');

    hideError('reg-error');

    if (!username || !email || !password) {
      showError('reg-error', 'Please fill in all fields');
      return;
    }
    if (password.length < 6) {
      showError('reg-error', 'Password must be at least 6 characters');
      return;
    }

    btn.innerHTML = '<span class="spinner"></span>Creating account...';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        showError('reg-error', data.message || 'Registration failed');
        return;
      }

      userEmail = email;
      document.getElementById('otp-email-display').textContent = email;
      document.getElementById('register-screen').style.display = 'none';
      document.getElementById('otp-screen').style.display = 'block';
      setTimeout(() => document.querySelector('.otp-digit').focus(), 100);

    } catch (err) {
      showError('reg-error', 'Server error, please try again');
    } finally {
      btn.innerHTML = 'Create Account';
      btn.disabled = false;
    }
  }

  async function handleConfirmEmail() {
    const digits = document.querySelectorAll('.otp-digit');
    const otp = Array.from(digits).map(d => d.value).join('');
    const btn = document.getElementById('otp-btn');

    hideError('otp-error');
    hideError('otp-success');

    if (otp.length !== 5) {
      showError('otp-error', 'Please enter the complete 5-digit code');
      return;
    }

    btn.innerHTML = '<span class="spinner"></span>Verifying...';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/auth/confirm-email`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail, otp })
      });

      const data = await res.json();

      if (!res.ok) {
        showError('otp-error', data.message || 'Invalid OTP');
        return;
      }

      showSuccess('otp-success', 'Email verified! Redirecting...');
      setTimeout(() => window.location.href = 'login.html', 1500);

    } catch (err) {
      showError('otp-error', 'Server error, please try again');
    } finally {
      btn.innerHTML = 'Verify Email';
      btn.disabled = false;
    }
  }

  async function handleResend() {
    if (!userEmail) return;
    try {
      await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail })
      });
      showSuccess('otp-success', 'Code resent!');
    } catch (err) {}
  }

  // OTP auto-focus next input
  document.addEventListener('DOMContentLoaded', () => {
    const digits = document.querySelectorAll('.otp-digit');
    digits.forEach((input, i) => {
      input.addEventListener('input', () => {
        if (input.value && i < digits.length - 1) digits[i + 1].focus();
      });
      input.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !input.value && i > 0) digits[i - 1].focus();
      });
    });
  });

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }
  function showSuccess(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideError(id) {
    document.getElementById(id).style.display = 'none';
  }
</script>

</body>
</html>
