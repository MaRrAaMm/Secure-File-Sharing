<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Secure File Sharing</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #070714; --surface: #0e0e24; --border: #1e1b4b;
      --accent: #6366f1; --accent-hover: #4f46e5;
      --text: #e0e7ff; --muted: #9ca3af; --dim: #374151;
    }
    body {
      background: var(--bg); min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif; padding: 2rem;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    .wrap { position: relative; z-index: 1; width: 100%; max-width: 440px; }
    .brand { text-align: center; margin-bottom: 2rem; }
    .brand-icon {
      width: 56px; height: 56px; background: #1e1b4b;
      border: 1px solid #4338ca; border-radius: 14px;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;
    }
    .brand-icon svg { width: 26px; height: 26px; fill: #818cf8; }
    .brand h1 { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .brand p { font-size: 13px; color: var(--accent); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; }
    .step-icon {
      width: 52px; height: 52px; background: #1e1b4b;
      border: 1px solid #4338ca; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;
    }
    .step-icon svg { width: 24px; height: 24px; fill: #818cf8; }
    .step-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; text-align: center; }
    .step-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 1.5rem; }
    .step-sub span { color: var(--text); font-weight: 500; }
    .form-label { font-size: 13px; color: var(--muted); margin-bottom: 6px; display: block; }
    .input-wrap { position: relative; }
    .input-wrap svg {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%); width: 16px; height: 16px; fill: var(--dim); pointer-events: none;
    }
    .form-control {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 14px;
      font-family: inherit; padding: 10px 38px 10px 14px; outline: none; transition: border 0.2s;
    }
    .form-control:focus { border-color: var(--accent); }
    .form-control::placeholder { color: var(--dim); }
    .btn-main {
      width: 100%; padding: 11px; background: var(--accent);
      border: none; border-radius: 10px; color: white;
      font-size: 15px; font-weight: 500; font-family: inherit;
      cursor: pointer; transition: background 0.2s, transform 0.15s; margin-top: 4px;
    }
    .btn-main:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-main:active { transform: translateY(0); }
    .btn-ghost {
      width: 100%; padding: 10px; background: transparent;
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--muted); font-size: 14px; font-family: inherit;
      cursor: pointer; transition: all 0.2s; margin-top: 10px;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); }
    .alert-msg { border-radius: 8px; font-size: 13px; padding: 10px 14px; margin-bottom: 1rem; display: none; }
    .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      margin-right: 6px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .otp-inputs { display: flex; gap: 10px; justify-content: center; margin: 1.5rem 0; }
    .otp-inputs input {
      width: 48px; height: 52px; text-align: center;
      font-size: 20px; font-weight: 600; background: var(--bg);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); outline: none; transition: border 0.2s; font-family: inherit;
    }
    .otp-inputs input:focus { border-color: var(--accent); }
    .resend { text-align: center; font-size: 12px; color: var(--dim); margin-top: 1rem; }
    .resend a { color: var(--accent); cursor: pointer; }
    .resend a:hover { text-decoration: underline; }
    .back { text-align: center; font-size: 13px; color: var(--muted); margin-top: 1.25rem; }
    .back a { color: #818cf8; text-decoration: none; }
    .back a:hover { text-decoration: underline; }
    /* steps indicator */
    .steps-bar { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 1.5rem; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: all 0.3s; }
    .step-dot.active { background: var(--accent); width: 24px; border-radius: 4px; }
    .step-dot.done { background: #22c55e; }
  </style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93C9.33 17.79 7 14.5 7 11V7.18L12 5z"/></svg>
    </div>
    <h1>Secure File Sharing</h1>
    <p>Reset your password</p>
  </div>

  <div class="card">
    <!-- steps bar -->
    <div class="steps-bar">
      <div class="step-dot active" id="dot-1"></div>
      <div class="step-dot" id="dot-2"></div>
      <div class="step-dot" id="dot-3"></div>
    </div>

    <!-- Step 1: Email -->
    <div id="step-1">
      <div class="alert-msg alert-error" id="s1-error"></div>
      <div style="text-align:center;margin-bottom:1.5rem">
        <div class="step-icon">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </div>
        <p class="step-title">Forgot your password?</p>
        <p class="step-sub">Enter your email and we'll send you a reset code</p>
      </div>
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <div class="input-wrap">
          <input type="email" class="form-control" id="email" placeholder="you@example.com" />
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </div>
      </div>
      <button class="btn-main" id="s1-btn" onclick="handleForgetPassword()">Send Reset Code</button>
      <div class="back">Remembered it? <a href="login.html">Back to login</a></div>
    </div>

    <!-- Step 2: OTP -->
    <div id="step-2" style="display:none">
      <div class="alert-msg alert-error" id="s2-error"></div>
      <div class="alert-msg alert-success" id="s2-success"></div>
      <div style="text-align:center;margin-bottom:1rem">
        <div class="step-icon">
          <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93C9.33 17.79 7 14.5 7 11V7.18L12 5z"/></svg>
        </div>
        <p class="step-title">Enter reset code</p>
        <p class="step-sub">We sent a 5-digit code to<br><span id="email-display"></span></p>
      </div>
      <div class="otp-inputs">
        <input type="text" maxlength="1" class="otp-digit" />
        <input type="text" maxlength="1" class="otp-digit" />
        <input type="text" maxlength="1" class="otp-digit" />
        <input type="text" maxlength="1" class="otp-digit" />
        <input type="text" maxlength="1" class="otp-digit" />
      </div>
      <button class="btn-main" id="s2-btn" onclick="handleVerifyOtp()">Verify Code</button>
      <div class="resend">Didn't receive it? <a onclick="handleResend()">Resend code</a></div>
    </div>

    <!-- Step 3: New Password -->
    <div id="step-3" style="display:none">
      <div class="alert-msg alert-error" id="s3-error"></div>
      <div style="text-align:center;margin-bottom:1.5rem">
        <div class="step-icon">
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
        </div>
        <p class="step-title">Set new password</p>
        <p class="step-sub">Choose a strong password for your account</p>
      </div>
      <div class="mb-3">
        <label class="form-label">New Password</label>
        <div class="input-wrap">
          <input type="password" class="form-control" id="new-password" placeholder="••••••••" />
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <div class="input-wrap">
          <input type="password" class="form-control" id="confirm-password" placeholder="••••••••" />
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
        </div>
      </div>
      <button class="btn-main" id="s3-btn" onclick="handleResetPassword()">Reset Password</button>
    </div>

  </div>
</div>

<script>
  const API = 'http://localhost:3000';
  let userEmail = '';
  let resetToken = '';

  // OTP auto-focus
  document.addEventListener('DOMContentLoaded', () => {
    const digits = document.querySelectorAll('.otp-digit');
    digits.forEach((input, i) => {
      input.addEventListener('input', () => {
        if (input.value && i < digits.length - 1) digits[i + 1].focus();
      });
      input.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !input.value && i > 0) digits[i - 1].focus();
      });
    });
  });

  async function handleForgetPassword() {
    const email = document.getElementById('email').value.trim();
    const btn = document.getElementById('s1-btn');
    hideMsg('s1-error');

    if (!email) { showError('s1-error', 'Please enter your email'); return; }

    btn.innerHTML = '<span class="spinner"></span>Sending...';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/auth/forget-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (!res.ok) { showError('s1-error', data.message || 'Failed to send code'); return; }

      userEmail = email;
      document.getElementById('email-display').textContent = email;
      goToStep(2);
      setTimeout(() => document.querySelector('.otp-digit').focus(), 100);

    } catch { showError('s1-error', 'Server error, please try again');
    } finally { btn.innerHTML = 'Send Reset Code'; btn.disabled = false; }
  }

  async function handleVerifyOtp() {
    const digits = document.querySelectorAll('.otp-digit');
    const otp = Array.from(digits).map(d => d.value).join('');
    const btn = document.getElementById('s2-btn');
    hideMsg('s2-error'); hideMsg('s2-success');

    if (otp.length !== 5) { showError('s2-error', 'Please enter the complete 5-digit code'); return; }

    btn.innerHTML = '<span class="spinner"></span>Verifying...';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/auth/verify-otp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail, otp })
      });
      const data = await res.json();
      if (!res.ok) { showError('s2-error', data.message || 'Invalid code'); return; }

      resetToken = data.resetToken;
      showSuccess('s2-success', 'Code verified!');
      setTimeout(() => goToStep(3), 800);

    } catch { showError('s2-error', 'Server error, please try again');
    } finally { btn.innerHTML = 'Verify Code'; btn.disabled = false; }
  }

  async function handleResetPassword() {
    const newPassword = document.getElementById('new-password').value;
    const confirmPassword = document.getElementById('confirm-password').value;
    const btn = document.getElementById('s3-btn');
    hideMsg('s3-error');

    if (!newPassword || !confirmPassword) { showError('s3-error', 'Please fill in all fields'); return; }
    if (newPassword.length < 6) { showError('s3-error', 'Password must be at least 6 characters'); return; }
    if (newPassword !== confirmPassword) { showError('s3-error', 'Passwords do not match'); return; }

    btn.innerHTML = '<span class="spinner"></span>Resetting...';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/auth/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ resetToken, newPassword })
      });
      const data = await res.json();
      if (!res.ok) { showError('s3-error', data.message || 'Reset failed'); return; }

      window.location.href = 'login.html';

    } catch { showError('s3-error', 'Server error, please try again');
    } finally { btn.innerHTML = 'Reset Password'; btn.disabled = false; }
  }

  async function handleResend() {
    if (!userEmail) return;
    await fetch(`${API}/auth/forget-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: userEmail })
    });
    showSuccess('s2-success', 'Code resent!');
  }

  function goToStep(n) {
    [1,2,3].forEach(i => {
      document.getElementById(`step-${i}`).style.display = i === n ? 'block' : 'none';
      const dot = document.getElementById(`dot-${i}`);
      dot.classList.remove('active','done');
      if (i < n) dot.classList.add('done');
      if (i === n) dot.classList.add('active');
    });
  }

  function showError(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.style.display = 'block'; }
  function showSuccess(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.style.display = 'block'; }
  function hideMsg(id) { document.getElementById(id).style.display = 'none'; }
</script>

</body>
</html>
