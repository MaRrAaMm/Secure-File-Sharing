<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Files — Secure File Sharing</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #070714; --surface: #0e0e24; --surface2: #13132e;
      --border: #1e1b4b; --accent: #6366f1; --accent-hover: #4f46e5;
      --text: #e0e7ff; --muted: #9ca3af; --dim: #374151;
      --danger: #ef4444; --success: #22c55e;
    }
    body { background: var(--bg); min-height: 100vh; font-family: 'Space Grotesk', sans-serif; color: var(--text); }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }

    /* navbar */
    .navbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0.875rem 1.5rem; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; }
    .nav-brand svg { width: 22px; height: 22px; fill: #818cf8; }
    .nav-brand span { font-size: 15px; font-weight: 600; color: var(--text); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-user { font-size: 13px; color: var(--muted); }
    .nav-user span { color: var(--text); font-weight: 500; }
    .btn-nav {
      padding: 7px 16px; border-radius: 8px; font-size: 13px;
      font-family: inherit; cursor: pointer; transition: all 0.2s; font-weight: 500;
    }
    .btn-upload { background: var(--accent); border: none; color: white; }
    .btn-upload:hover { background: var(--accent-hover); }
    .btn-logout { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* main */
    .main { position: relative; z-index: 1; padding: 2rem 1.5rem; max-width: 1100px; margin: 0 auto; }

    /* stats */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 2rem; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem 1.25rem;
    }
    .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .stat-value { font-size: 22px; font-weight: 600; color: var(--text); }
    .stat-icon { float: right; margin-top: -28px; }
    .stat-icon svg { width: 20px; height: 20px; fill: #818cf8; opacity: 0.6; }

    /* section header */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .section-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .section-count { font-size: 13px; color: var(--muted); }

    /* file cards grid */
    .files-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

    .file-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.25rem; transition: border-color 0.2s;
      position: relative; overflow: hidden;
    }
    .file-card:hover { border-color: #4338ca; }
    .file-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 2px; background: var(--accent); opacity: 0; transition: opacity 0.2s;
    }
    .file-card:hover::before { opacity: 1; }

    .file-icon {
      width: 44px; height: 44px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; margin-bottom: 12px;
    }
    .file-icon svg { width: 22px; height: 22px; }
    .file-icon.pdf { background: rgba(239,68,68,0.15); }
    .file-icon.pdf svg { fill: #f87171; }
    .file-icon.doc { background: rgba(59,130,246,0.15); }
    .file-icon.doc svg { fill: #60a5fa; }
    .file-icon.default { background: rgba(99,102,241,0.15); }
    .file-icon.default svg { fill: #818cf8; }

    .file-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
    .file-meta span { color: var(--dim); }

    .file-actions { display: flex; gap: 8px; }
    .btn-action {
      flex: 1; padding: 7px 0; border-radius: 8px; font-size: 12px;
      font-family: inherit; cursor: pointer; transition: all 0.2s;
      font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .btn-action svg { width: 13px; height: 13px; }
    .btn-download { background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); color: #818cf8; }
    .btn-download:hover { background: rgba(99,102,241,0.25); }
    .btn-share { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25); color: #4ade80; }
    .btn-share:hover { background: rgba(34,197,94,0.2); }
    .btn-delete { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #f87171; }
    .btn-delete:hover { background: rgba(239,68,68,0.2); }

    /* empty state */
    .empty-state { text-align: center; padding: 4rem 2rem; }
    .empty-icon { width: 64px; height: 64px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }
    .empty-icon svg { width: 28px; height: 28px; fill: var(--dim); }
    .empty-title { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
    .empty-sub { font-size: 14px; color: var(--muted); margin-bottom: 1.5rem; }
    .btn-empty { padding: 10px 24px; background: var(--accent); border: none; border-radius: 10px; color: white; font-size: 14px; font-family: inherit; cursor: pointer; font-weight: 500; }
    .btn-empty:hover { background: var(--accent-hover); }

    /* upload modal */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: none; align-items: center; justify-content: center; z-index: 99999;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1a3e; border: 1px solid #4338ca;
      border-radius: 20px; padding: 2rem; width: 90%; max-width: 420px; margin: 1rem;
      position: relative; z-index: 100000;
    }
    .modal-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 1.5rem; }
    .drop-zone {
      border: 2px dashed var(--border); border-radius: 12px;
      padding: 2.5rem 1rem; text-align: center; cursor: pointer;
      transition: border-color 0.2s; margin-bottom: 1.25rem;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); }
    .drop-zone svg { width: 32px; height: 32px; fill: var(--dim); margin-bottom: 10px; }
    .drop-zone p { font-size: 13px; color: var(--muted); }
    .drop-zone span { color: var(--accent); cursor: pointer; }
    .drop-zone .file-chosen { font-size: 13px; color: var(--text); margin-top: 8px; font-weight: 500; }
    .modal-actions { display: flex; gap: 10px; }
    .btn-cancel { flex: 1; padding: 10px; background: transparent; border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-family: inherit; cursor: pointer; font-size: 14px; }
    .btn-cancel:hover { border-color: var(--accent); color: var(--text); }
    .btn-confirm { flex: 2; padding: 10px; background: var(--accent); border: none; border-radius: 10px; color: white; font-family: inherit; cursor: pointer; font-size: 14px; font-weight: 500; }
    .btn-confirm:hover { background: var(--accent-hover); }

    /* share modal */
    .share-list { max-height: 200px; overflow-y: auto; margin-bottom: 1rem; }
    .share-user {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: background 0.2s;
    }
    .share-user:hover { background: var(--surface2); }
    .share-user.selected { background: rgba(99,102,241,0.15); }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #1e1b4b; border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; color: #818cf8;
    }
    .user-name { font-size: 14px; color: var(--text); }
    .user-email { font-size: 12px; color: var(--muted); }
    .perm-select {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-size: 12px; padding: 4px 8px; font-family: inherit; outline: none;
    }
    .perm-select:focus { border-color: var(--accent); }

    /* toast */
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500;
      z-index: 300; opacity: 0; transform: translateY(10px);
      transition: all 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
    .toast.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #file-input { display: none; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-brand">
    <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93C9.33 17.79 7 14.5 7 11V7.18L12 5z"/></svg>
    <span>Secure File Sharing</span>
  </div>
  <div class="nav-right">
    <span class="nav-user">Hello, <span id="nav-username">...</span></span>
    <button class="btn-nav btn-upload" onclick="openUpload()">+ Upload File</button>
    <a href="profile.html" class="btn-nav btn-logout" style="text-decoration:none">Profile</a>
    <button class="btn-nav btn-logout" onclick="handleLogout()">Logout</button>
  </div>
</nav>

<!-- Main -->
<div class="main">
  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Total Files</div>
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Size</div>
      <div class="stat-value" id="stat-size">0 MB</div>
      <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Shared Files</div>
      <div class="stat-value" id="stat-shared">0</div>
      <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg></div>
    </div>
  </div>

  <!-- Files -->
  <div class="section-header">
    <span class="section-title">My Files</span>
    <span class="section-count" id="files-count"></span>
  </div>

  <div id="files-grid" class="files-grid"></div>
  <div id="empty-state" class="empty-state" style="display:none">
    <div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg></div>
    <p class="empty-title">No files yet</p>
    <p class="empty-sub">Upload your first encrypted file</p>
    <button class="btn-empty" onclick="openUpload()">Upload File</button>
  </div>
</div>

<!-- Upload Modal -->
<div class="modal-overlay" id="upload-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:99999;align-items:center;justify-content:center;">
  <div style="background:#1a1a3e;border:1px solid #4338ca;border-radius:20px;padding:2rem;width:90%;max-width:420px;position:relative;z-index:100000;">
    <p class="modal-title">Upload File</p>
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
      <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
      <p>Drop your file here or <span>browse</span></p>
      <p style="font-size:11px;margin-top:4px;color:var(--dim)">PDF, DOC, DOCX up to 10MB</p>
      <p class="file-chosen" id="chosen-name"></p>
    </div>
    <input type="file" id="file-input" accept=".pdf,.doc,.docx" onchange="onFileChange(event)" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeUpload()">Cancel</button>
      <button class="btn-confirm" id="upload-btn" onclick="handleUpload()">Upload & Encrypt</button>
    </div>
  </div>
</div>

<!-- Share Modal -->
<div class="modal-overlay" id="share-modal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:99999;align-items:center;justify-content:center;display:none;">
  <div style="background:#1a1a3e;border:1px solid #4338ca;border-radius:20px;padding:2rem;width:90%;max-width:420px;position:relative;z-index:100000;">
    <p class="modal-title">Share File</p>
    <p style="font-size:13px;color:var(--muted);margin-bottom:1rem">Select a user and permission</p>
    <div class="share-list" id="share-list"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeShare()">Cancel</button>
      <button class="btn-confirm" id="share-btn" onclick="handleShare()">Share</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:3000';
  const token = localStorage.getItem('token');
  let selectedFile = null;
  let shareFileId = null;
  let selectedUserId = null;
  let selectedPermission = 'read';

  if (!token) window.location.href = 'login.html';

  // decode username from token
  function getUsername() {
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      return payload.email?.split('@')[0] || 'User';
    } catch { return 'User'; }
  }
  document.getElementById('nav-username').textContent = getUsername();

  async function authFetch(url, options = {}) {
    return fetch(`${API}${url}`, {
      ...options,
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...options.headers }
    });
  }

  // load files
  async function loadFiles() {
    try {
      const res = await authFetch('/files/');
      const data = await res.json();
      if (!res.ok) { if (res.status === 401) window.location.href = 'login.html'; return; }

      const files = data.data || [];
      renderFiles(files);
      updateStats(files);
    } catch { showToast('Failed to load files', 'error'); }
  }

  function updateStats(files) {
    document.getElementById('stat-total').textContent = files.length;
    const totalSize = files.reduce((sum, f) => sum + (f.size || 0), 0);
    document.getElementById('stat-size').textContent = (totalSize / (1024*1024)).toFixed(1) + ' MB';
    const shared = files.filter(f => f.sharedWith?.length > 0).length;
    document.getElementById('stat-shared').textContent = shared;
    document.getElementById('files-count').textContent = files.length + ' file' + (files.length !== 1 ? 's' : '');
  }

  function getFileIcon(mimeType) {
    if (mimeType === 'application/pdf') return { cls: 'pdf', svg: '<path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v2H7.5V7H10c.83 0 1.5.67 1.5 1.5v1zm5 2c0 .83-.67 1.5-1.5 1.5h-2.5V7H15c.83 0 1.5.67 1.5 1.5v3zm4-3H19v1h1.5V11H19v2h-1.5V7h3v1.5zM9 9.5h1v-1H9v1zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm10 5.5h1v-3h-1v3z"/>' };
    if (mimeType?.includes('word')) return { cls: 'doc', svg: '<path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>' };
    return { cls: 'default', svg: '<path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>' };
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/(1024*1024)).toFixed(1) + ' MB';
  }

  function formatDate(dateStr) {
    return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function renderFiles(files) {
    const grid = document.getElementById('files-grid');
    const empty = document.getElementById('empty-state');
    if (files.length === 0) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    const icon = (f) => getFileIcon(f.mimeType);
    grid.innerHTML = files.map(f => {
      const ic = icon(f);
      return `
        <div class="file-card">
          <div class="file-icon ${ic.cls}"><svg viewBox="0 0 24 24">${ic.svg}</svg></div>
          <div class="file-name" title="${f.originalName}">${f.originalName}</div>
          <div class="file-meta">${formatSize(f.size)} &nbsp;·&nbsp; ${formatDate(f.createdAt)}</div>
          <div class="file-actions">
            <button class="btn-action btn-download" onclick="handleDownload('${f._id}','${f.originalName}')">
              <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
              Download
            </button>
            <button class="btn-action btn-share" onclick="openShare('${f._id}')">
              <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
              Share
            </button>
            <button class="btn-action btn-delete" onclick="handleDelete('${f._id}')">
              <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
              Delete
            </button>
          </div>
        </div>`;
    }).join('');
  }

  // upload
  function openUpload() { document.getElementById('upload-modal').style.display = 'flex'; }
  function closeUpload() { document.getElementById('upload-modal').style.display = 'none'; selectedFile = null; document.getElementById('chosen-name').textContent = ''; }
  function onFileChange(e) { selectedFile = e.target.files[0]; if (selectedFile) document.getElementById('chosen-name').textContent = selectedFile.name; }
  function onDragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('dragover'); }
  function onDragLeave() { document.getElementById('drop-zone').classList.remove('dragover'); }
  function onDrop(e) { e.preventDefault(); onDragLeave(); selectedFile = e.dataTransfer.files[0]; if (selectedFile) document.getElementById('chosen-name').textContent = selectedFile.name; }

  async function handleUpload() {
    if (!selectedFile) { showToast('Please select a file', 'error'); return; }
    const btn = document.getElementById('upload-btn');
    btn.innerHTML = '<span class="spinner"></span>Encrypting...';
    btn.disabled = true;
    try {
      const formData = new FormData();
      formData.append('file', selectedFile);
      const res = await fetch(`${API}/files/upload`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      });
      const data = await res.json();
      if (!res.ok) { showToast(data.message || 'Upload failed', 'error'); return; }
      showToast('File uploaded & encrypted!', 'success');
      closeUpload();
      loadFiles();
    } catch { showToast('Server error', 'error');
    } finally { btn.innerHTML = 'Upload & Encrypt'; btn.disabled = false; }
  }

  // download
  async function handleDownload(fileId, fileName) {
    try {
      const res = await fetch(`${API}/files/download/${fileId}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) { showToast('Download failed', 'error'); return; }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = fileName; a.click();
      URL.revokeObjectURL(url);
      showToast('File downloaded!', 'success');
    } catch { showToast('Download failed', 'error'); }
  }

  // delete
  async function handleDelete(fileId) {
    if (!confirm('Are you sure you want to delete this file?')) return;
    try {
      const res = await authFetch(`/files/${fileId}`, { method: 'DELETE' });
      const data = await res.json();
      if (!res.ok) { showToast(data.message || 'Delete failed', 'error'); return; }
      showToast('File deleted', 'success');
      loadFiles();
    } catch { showToast('Server error', 'error'); }
  }

  // share
  async function openShare(fileId) {
    shareFileId = fileId;
    selectedUserId = null;
    try {
      console.log("FINAL URL:", API + `/files/share/${shareFileId}`);
      const res = await authFetch('/users/');
      const data = await res.json();
      const users = data.data || [];
      const list = document.getElementById('share-list');
      if (users.length === 0) { list.innerHTML = '<p style="font-size:13px;color:var(--muted);text-align:center;padding:1rem">No other users found</p>'; }
      else {
        list.innerHTML = users.map(u => `
          <div class="share-user" id="user-${u._id}" onclick="selectUser('${u._id}')">
            <div class="user-info">
              <div class="user-avatar">${u.username[0].toUpperCase()}</div>
              <div><div class="user-name">${u.username}</div><div class="user-email">${u.email}</div></div>
            </div>
            <select class="perm-select" id="perm-${u._id}" onclick="event.stopPropagation()" onchange="selectedPermission=this.value">
              <option value="read">Read</option>
              <option value="download">Download</option>
            </select>
          </div>`).join('');
      }
      document.getElementById('share-modal').style.display = 'flex';
    } catch { showToast('Failed to load users', 'error'); }
  }

  function selectUser(userId) {
    document.querySelectorAll('.share-user').forEach(el => el.classList.remove('selected'));
    document.getElementById(`user-${userId}`)?.classList.add('selected');
    selectedUserId = userId;
    const perm = document.getElementById(`perm-${userId}`);
    if (perm) selectedPermission = perm.value;
  }

  function closeShare() { document.getElementById('share-modal').style.display = 'none'; shareFileId = null; selectedUserId = null; }

  async function handleShare() {
    if (!selectedUserId) { showToast('Please select a user', 'error'); return; }
    const btn = document.getElementById('share-btn');
    btn.innerHTML = '<span class="spinner"></span>Sharing...';
    btn.disabled = true;
    try {
      const res = await authFetch(`/files/share/${shareFileId}`, {
        method: 'POST',
        body: JSON.stringify({ targetUserId: selectedUserId, permission: selectedPermission })
      });
      const data = await res.json();
      if (!res.ok) { showToast(data.message || 'Share failed', 'error'); return; }
      showToast('File shared successfully!', 'success');
      closeShare();
      loadFiles();
    } catch { showToast('Server error', 'error');
    } finally { btn.innerHTML = 'Share'; btn.disabled = false; }
  }

  // logout
  function handleLogout() { localStorage.removeItem('token'); window.location.href = 'login.html'; }

  // toast
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  loadFiles();
</script>
</body>
</html>
